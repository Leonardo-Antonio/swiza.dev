        <h1>DevForge — Free Online Developer Tools</h1>
        <p>
          DevForge is a free, privacy-first collection of browser-based
          developer tools. No data is ever sent to external servers — everything
          runs locally in your browser.
        </p>
        <h2>Available Tools</h2>
        <ul>
          <li>
            <strong>JSON Formatter</strong> — Parse, pretty-print, and minify
            JSON with syntax highlighting.
          </li>
          <li>
            <strong>Text Diff</strong> — Compare two texts side by side and see
            additions, deletions, and unchanged lines.
          </li>
          <li>
            <strong>JSON to Class</strong> — Convert JSON objects into
            TypeScript interfaces or Python dataclasses automatically.
          </li>
          <li>
            <strong>JWT Decoder</strong> — Decode JSON Web Tokens to inspect
            headers, payloads, and expiration status.
          </li>
          <li>
            <strong>Base64 Encoder/Decoder</strong> — Encode and decode Base64
            strings, with image preview support.
          </li>
          <li>
            <strong>Regex Tester</strong> — Write and test regular expressions
            with real-time match highlighting and capture groups.
          </li>
          <li>
            <strong>SQL Formatter</strong> — Format and beautify raw SQL queries
            for better readability.
          </li>
          <li>
            <strong>UUID Generator</strong> — Generate random UUIDs (v4) in bulk
            with one click.
          </li>
          <li>
            <strong>Log Prettifier</strong> — Format production JSON logs and
            extract embedded SQL queries for easy reading.
